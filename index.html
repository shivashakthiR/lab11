<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Styled Page</title>
    <style>
        body {
            background-color: #f0f8ff; /* Alice Blue background */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #2c3e50;
        }
        p {
            color: #34495e;
            font-size: 18px;
        }
        .highlight {
            color: #e74c3c; /* Red text for a specific class */
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Website</h1>
    <p>This is a <span class="highlight">simple example</span> of HTML with styling.</p>
</body>
</html>
